name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Install server dependencies
        run: npm ci --prefix server

      - name: Run frontend and backend tests
        run: npm test

  containers:
    name: Build and run containers
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and start Docker Compose stack
        run: docker compose --env-file .env.example up -d --build

      - name: Wait for backend healthcheck
        run: |
          timeout 120 bash -c 'until curl -fsS http://localhost:5000/api/health; do sleep 5; done'

      - name: Wait for frontend
        run: |
          timeout 120 bash -c 'until curl -fsS http://localhost:3001; do sleep 5; done'

      - name: Wait for nginx proxy
        run: |
          timeout 120 bash -c 'until curl -fsS http://localhost/api/health; do sleep 5; done'

      - name: Show running containers
        run: docker compose --env-file .env.example ps

      - name: Show compose logs on failure
        if: failure()
        run: docker compose --env-file .env.example logs --no-color --tail=200

      - name: Stop Docker Compose stack
        if: always()
        run: docker compose --env-file .env.example down -v

  dockerhub:
    name: Push images to Docker Hub
    runs-on: ubuntu-latest
    needs: containers
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/test-constructor-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/test-constructor-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          build-args: |
            REACT_APP_API_URL=${{ vars.REACT_APP_API_URL || 'http://localhost:5000' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/test-constructor-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/test-constructor-frontend:${{ github.sha }}
